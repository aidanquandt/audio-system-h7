<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STM32 RPC Host</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>STM32 RPC Host</h1>
  <div id="status" class="status disconnected">Disconnected</div>
  <div class="controls">
    <button class="led-g" data-cmd="led_green">Toggle green LED</button>
    <button class="led-r" data-cmd="led_red">Toggle red LED</button>
  </div>
  <div class="gain-row">
    <label>Gain</label>
    <input type="number" id="gainCh" value="0" min="0" max="255" step="1">
    <input type="number" id="gainDb" value="0" min="-60" max="24" step="0.5">
    <span>dB</span>
    <button id="setGain">Set gain</button>
  </div>
  <div class="panels">
    <div class="panel">
      <h2>Heartbeats</h2>
      <div id="panel-heartbeats" class="panel-body"></div>
    </div>
    <div class="panel">
      <h2>Task utilization (CM4)</h2>
      <div id="panel-util-cm4" class="panel-body"></div>
    </div>
    <div class="panel">
      <h2>Task utilization (CM7)</h2>
      <div id="panel-util-cm7" class="panel-body"></div>
    </div>
    <div class="panel">
      <h2>Peak meter</h2>
      <div id="panel-peak" class="panel-body"></div>
    </div>
    <div class="panel panel-full">
      <h2>Recent</h2>
      <div id="panel-recent" class="panel-body"></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
